<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <title>Hemanta Boro's Portfolio</title>
    <style>
        * {
            margin: 0;
            padding: 0;

        }

        body {
            background-color: #0c0542;
            color: white;
               font-family: "Poppins", sans-serif;
        }

        .poppins-regular {
            font-family: "Poppins", sans-serif;
            font-weight: 400;
            font-style: normal;
        }

        .poppins-bold {
            font-family: "Poppins", sans-serif;
            font-weight: 700;
            font-style: normal;
        }

        nav {
            display: flex;
            justify-content: space-around;
            align-items: center;
            height: 92px;
            background-color: #120d33;
        }

        nav ul {
            display: flex;
            justify-content: center;
        }

        nav ul li {
            list-style: none;
            margin: 0 20px;

        }

        .left {
            font-size: 1.5rem;
        }

        .firstSection {
            display: flex;
            justify-content: space-around;
            margin: 80px 0;
        
        }
       .firstSection > div{
        width: 30%;
       }

        div.leftSection {
            width: 40%;
            height: 400px;
            font-size: 2rem;
            margin: 80px 0;
        
        }
        .rightSection img{
            width: 80%;
            margin:-67px 26px;
        }
    </style>
</head>

<body>
    <header>
        <nav>
            <div class="left">Hemanta Boro's Portfolio</div>
            <div class="right">

                <ul>
                    <li>Home</li>
                    <li>About Me</li>
                    <li>Projects</li>
                    <li>Contact Me</li>
                </ul>

            </div>
        </nav>
    </header>
    <main>
        <section class="firstSection">
            <div class="leftSection">
                Hi, I'm Hemanta Boro
                <div>A passionate Web developer </div>
                <div> and Data Analyst</div>
            </div>
            <div class="rightSection">
                <img src="bg.png" alt="Profile Picture">
            </div>
        </section>


    </main>
</body>

</html>
