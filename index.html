<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <title>Hemanta Boro's Portfolio</title>
    <style>
        * {
            margin: 0;
            padding: 0;

        }

        body {
            background-color: #0c0542;
            color: white;
               font-family: "Poppins", sans-serif;
        }

        .poppins-regular {
            font-family: "Poppins", sans-serif;
            font-weight: 400;
            font-style: normal;
        }

        .poppins-bold {
            font-family: "Poppins", sans-serif;
            font-weight: 700;
            font-style: normal;
        }

        nav {
            display: flex;
            justify-content: space-around;
            align-items: center;
            height: 92px;
            background-color: #120d33;
        }

        nav ul {
            display: flex;
            justify-content: center;
        }

        nav ul li {
            list-style: none;
            margin: 0 20px;

        }
         nav ul li a {
            text-decoration: none;
            color: white;
            font-size: 1rem;

        }
        nav ul li a:hover {
            color: rgb(165, 165, 238);
            font-size: 1.02rem;

        }   

        .left {
            font-size: 1.5rem;
        }

        .firstSection {
            display: flex;
            justify-content: space-around;
            margin: 80px 0;
            align-items: center;
        
        }
       .firstSection > div{
        width: 30%;
       }

        div.leftSection {
            width: 40%;
            height: 400px;
            font-size: 2rem;
            margin: 80px 0;
        
        }
        .rightSection img{
            width: 80%;
            margin:-67px 26px;
        }
        #element{
            color: rgb(165, 165, 238);
            font-size: 2.2rem;
            margin-top: 20px;
        }
        .secondSection{
          margin: auto;
          max-width: 80vw;
         
        }
        .secondSection h1{
            font-size: 2.1rem;
            margin-bottom: 40px;
        }   
        main hr{
            margin: 80px auto;
            width: 80%;
            border: 1px solid rgb(165, 165, 238);
        }
    </style>
</head>

<body>
    <header>
        <nav>
            <div class="left">Hemanta Boro's Portfolio</div>
            <div class="right">

                <ul>
                    <li><a href="#home">Home</a></li>
                    <li><a href="#about">About Me</a></li>
                    <li><a href="#projects">Projects</a></li>
                    <li><a href="#contact">Contact me </a></li>
                </ul>

            </div>
        </nav>
    </header>
    <main>
        <section class="firstSection">
            <div class="leftSection">
                Hi, I'm Hemanta Boro
                <div>A passionate Web developer </div>
                <div> and Data Analyst</div>
                <span id="element"></span>
            </div>
            <div class="rightSection">
                <img src="bg.png" alt="Profile Picture">
            </div>
        </section>
        <hr>
        <section class="secondSection">
            span.
            <h1>Work Experience</h1>
        </section>


    </main>
    <script src="https://unpkg.com/typed.js@3.0.0/dist/typed.umd.js"></script>
    <script>
        var typed = new Typed('#element', {
            strings: ['Hello Everyone!', 'Welcome to my portfolio website!'],
            typeSpeed: 50,
            backSpeed: 50,
            loop: true
        }); 
    </script>
</body>

</html>
